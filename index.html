<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг АЗС</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; margin: 0; }
        h1 { text-align: center; font-size: 1.5rem; }

        /* Адаптивная сетка */
        .grid { 
            display: grid; 
            gap: 15px; 
            /* Смартфоны (по умолчанию) - 1 колонка */
            grid-template-columns: 1fr; 
        }

        /* Планшеты - 2 колонки */
        @media (min-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ПК - 3 или 4 колонки */
        @media (min-width: 1024px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }

        .card { 
            background: white; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .btn { 
            display: block; width: 100%; padding: 14px; margin-top: 10px; 
            border: none; border-radius: 8px; cursor: pointer; color: white; 
            text-align: center; text-decoration: none; font-weight: bold; 
            font-size: 16px; /* Крупный шрифт для удобства нажатия пальцем */
        }
        
        .address-text { cursor: pointer; color: #2980b9; text-decoration: underline; margin: 10px 0; font-size: 0.9rem; }
        
        .btn-maps { background: #e67e22; }
        .btn-multigo { background: #27ae60; }
    </style>
</head>
<body>
    <h1>Актуальные АЗС</h1>
    <div class="grid" id="list">Загрузка данных...</div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Адрес скопирован!");
            });
        }

        fetch('data.json').then(r => r.json()).then(data => {
            document.getElementById('list').innerHTML = data.map(azs => `
                <div class="card">
                    <div>
                        <h3>${azs.name}</h3>
                        <p class="address-text" onclick="copyToClipboard('${azs.address}')">
                            📍 ${azs.address}
                        </p>
                        <small>${azs.info}</small>
                    </div>
                    <div>
                        <a class="btn btn-maps" href="https://yandex.ru/maps/?rtext=~${azs.lat},${azs.lng}" target="_blank">⛽ Открыть на картах</a>
                        <a class="btn btn-multigo" href="https://multigo.ru/benzin/search_azs/near" target="_blank">💰 MultiGO Топливо</a>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
