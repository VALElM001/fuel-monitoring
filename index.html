<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг Топлива — Свердловская область</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/MarkerCluster.Default.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #f5f5f5; }
        
        .search-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 5px; width: 90%; max-width: 400px;
        }
        .search-container input {
            flex: 1; padding: 10px 15px; border: none; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 14px; outline: none;
        }
        .search-container button {
            padding: 10px; background: #2c3e50; color: white; border: none;
            border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .legend {
            position: absolute; bottom: 30px; left: 10px; z-index: 1000;
            background: white; padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); font-size: 13px;
        }
        .badge { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .green { background: #2ecc71; }
        .red { background: #e74c3c; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="city-search" placeholder="Поиск города (напр. Берёзовский)...">
        <button onclick="locateUser()">📍 Найти меня</button>
    </div>

    <div id="map"></div>

    <div class="legend">
        <h4>Наличие топлива в области:</h4>
        <div><span class="badge green"></span> -  Бензин в наличии</div>
        <div><span class="badge red"></span> -  Ограничения / Нет АИ-95</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/leaflet.markercluster.js"></script>
    
    <script>
        // Инициализация карты
        const map = L.map('map').setView([56.8389, 60.6057], 9);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        function getMarkerIcon(status) {
            const color = status === 'available' ? 'green' : 'red';
            return L.icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [22, 36],
                iconAnchor: [11, 36],
                popupAnchor: [1, -32]
            });
        }

        const markersGroup = L.markerClusterGroup({ maxClusterRadius: 40 });

        // Загрузка с защитой от кэша + обработка ошибок загрузки
        fetch('data.json?v=' + new Date().getTime())
            .then(response => {
                if (!response.ok) throw new Error("Файл data.json не найден на сервере");
                return response.json();
            })
            .then(azsData => {
                azsData.forEach(azs => {
                    const marker = L.marker([azs.lat, azs.lng], { icon: getMarkerIcon(azs.status) })
                                    .bindPopup(azs.info);
                    markersGroup.addLayer(marker);
                });
                map.addLayer(markersGroup);
            })
            .catch(error => {
                console.error("Ошибка:", error);
                alert("Ошибка загрузки данных заправок: " + error.message);
            });

        function locateUser() {
            map.locate({setView: true, maxZoom: 13});
        }

        map.on('locationerror', () => alert("Не удалось определить геопозицию. Проверьте разрешения GPS."));

        document.getElementById('city-search').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = this.value;
                if(!query) return;
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ', Свердловская область')}`)
                    .then(res => res.json())
                    .then(data => {
                        if(data.length > 0) {
                            map.setView([data[0].lat, data[0].lon], 12);
                        } else {
                            alert("Город в области не найден");
                        }
                    });
            }
        });
    </script>
</body>
</html>
