<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг Топлива АЗС (Авто-обновление)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .legend {
            position: absolute; bottom: 30px; left: 10px; z-index: 1000;
            background: white; padding: 10px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); font-size: 14px;
        }
        .legend div { margin-bottom: 5px; }
        .badge { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; }
        .green { background: #2ecc71; }
        .red { background: #e74c3c; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="legend">
        <h4>Статус АИ-95 / Топлива:</h4>
        <div><span class="badge green"></span> В наличии</div>
        <div><span class="badge red"></span> Нет в наличии / Дефицит</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([56.8389, 60.6057], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        function getMarkerIcon(status) {
            const color = status === 'available' ? 'green' : 'red';
            return L.icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });
        }

        // Загружаем динамические данные из файла data.json, который создает Python
        fetch('data.json')
            .then(response => response.json())
            .then(azsData => {
                azsData.forEach(azs => {
                    L.marker([azs.lat, azs.lng], { icon: getMarkerIcon(azs.status) })
                        .addTo(map)
                        .bindPopup(`<b>${azs.name}</b><br>${azs.info}`);
                });
            })
            .catch(error => console.error('Ошибка загрузки данных АЗС:', error));
    </script>
</body>
</html>
