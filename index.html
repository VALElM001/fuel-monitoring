<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мониторинг АЗС</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Кнопки всегда внизу */
        }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 6px; cursor: pointer; color: white; text-align: center; text-decoration: none; font-weight: bold; box-sizing: border-box; }
        
        .address-text { cursor: pointer; color: #2980b9; text-decoration: underline; margin: 10px 0; }
        
        .btn-maps { background: #e67e22; }
        .btn-multigo { background: #27ae60; }
        
        h3 { min-height: 40px; margin-top: 0; }
    </style>
</head>
<body>
    <h1>Актуальные АЗС</h1>
    <div class="grid" id="list">Загрузка данных...</div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Адрес скопирован: " + text);
            });
        }

        fetch('data.json').then(r => r.json()).then(data => {
            document.getElementById('list').innerHTML = data.map(azs => `
                <div class="card">
                    <div>
                        <h3>${azs.name}</h3>
                        <p class="address-text" onclick="copyToClipboard('${azs.address}')">
                            📍 ${azs.address}
                        </p>
                        <small>${azs.info}</small>
                    </div>
                    <div>
                        <a class="btn btn-maps" href="https://yandex.ru/maps/?rtext=~${azs.lat},${azs.lng}" target="_blank">⛽ Открыть на картах</a>
                        <a class="btn btn-multigo" href="https://multigo.ru/benzin/search_azs/near" target="_blank">💰 MultiGO Топливо</a>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
